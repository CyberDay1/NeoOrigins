modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    logoFile = "neoorigins.png"
    description = '''${mod_description}'''

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "jei"
    type = "optional"
    versionRange = "[19,)"
    ordering = "AFTER"
    side = "CLIENT"

[[dependencies.${mod_id}]]
    modId = "roughlyenoughitems"
    type = "optional"
    versionRange = "[16,)"
    ordering = "AFTER"
    side = "CLIENT"

[[mixins]]
    config = "neoorigins.mixins.json"

[[mixins]]
    config = "neoorigins-compat.mixins.json"
