name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.1)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Find JAR
        id: jar
        run: |
          JAR=$(find versions/*/build/libs build/libs -name 'neoorigins-*.jar' 2>/dev/null | grep -v sources | grep -v javadoc | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NeoOrigins ${{ steps.version.outputs.tag }}
          body: |
            ## NeoOrigins ${{ steps.version.outputs.tag }}

            Built for **Minecraft 26.1** with **NeoForge 26.1.0.1-beta**.

            ### Installation
            Drop `${{ steps.jar.outputs.name }}` into your `mods/` folder.

            ### Origins Compatibility
            Drop Origins mod content packs (`.jar`, `.zip`, or folder) into the `originpacks/` folder in your game directory.
          files: ${{ steps.jar.outputs.path }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      - name: Upload to CurseForge
        if: vars.CURSEFORGE_PROJECT_ID != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: ${{ steps.jar.outputs.path }}
          game_endpoint: minecraft
          game_versions: "Minecraft 26.1,NeoForge"
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          release_type: beta
          display_name: NeoOrigins ${{ steps.version.outputs.tag }}

      - name: Upload to Modrinth
        if: vars.MODRINTH_PROJECT_ID != ''
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT_ID }}
          files: ${{ steps.jar.outputs.path }}
          name: NeoOrigins ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.tag }}
          changelog: "Built for Minecraft 26.1 with NeoForge 26.1.0.1-beta."
          loaders: neoforge
          game-versions: "26.1"
          channel: beta
