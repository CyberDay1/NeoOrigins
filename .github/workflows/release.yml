name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.3.2)'
        required: true
      changelog:
        description: 'Release changelog (markdown)'
        required: true
        default: 'No changelog provided.'

# Post-Stonecutter layout (2026-04):
#   - `master` branch builds a single jar at `build/libs/` for MC
#     26.1.2, declared compatible with [26.1, 26.2) via
#     minecraft_version_range, and is published under all three MC
#     26.1.x versions on CurseForge/Modrinth in a single upload.
#   - `1.21.1` branch builds a single jar at `build/libs/` for MC
#     1.21.1, published under 1.21.1.
#
# Neither branch uses Stonecutter any more, so the old `versions/26.1/`
# and `versions/26.1.1/` subfolder paths from the v1.0.x workflow no
# longer exist.

jobs:
  build-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-master-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-master-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Find MC 26.1 JAR
        id: jar-26-1
        run: |
          JAR=$(find build/libs -name 'neoorigins-*+26.1.jar' ! -name '*sources*' ! -name '*javadoc*' | head -1)
          if [ -z "$JAR" ]; then
            echo "::error::Could not locate master jar under build/libs"
            ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload MC 26.1 JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-26-1
          path: ${{ steps.jar-26-1.outputs.path }}

  build-1-21-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 1.21.1 branch
        uses: actions/checkout@v4
        with:
          ref: '1.21.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-1211-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-1211-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Find MC 1.21.1 JAR
        id: jar-1-21-1
        run: |
          JAR=$(find build/libs -name 'neoorigins-*+1.21.1.jar' ! -name '*sources*' ! -name '*javadoc*' | head -1)
          if [ -z "$JAR" ]; then
            echo "::error::Could not locate 1.21.1 jar under build/libs"
            ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload MC 1.21.1 JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-1-21-1
          path: ${{ steps.jar-1-21-1.outputs.path }}

  release:
    needs: [build-master, build-1-21-1]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Full checkout so we have the annotated-tag metadata — we pull
      # the changelog out of the tag's own message body below.
      - name: Checkout (for tag metadata)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download MC 26.1 JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-26-1
          path: jars/26.1

      - name: Download MC 1.21.1 JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-1-21-1
          path: jars/1.21.1

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # Extract the release changelog in priority order:
      #   1. workflow_dispatch → the `changelog` input verbatim.
      #   2. tag push on an annotated tag → the tag's message body,
      #      stripping any trailing PGP signature block git may append.
      #   3. tag push on a lightweight tag (no annotation) → the
      #      pointed-at commit's message.
      #   4. Last-resort fallback → "Release <tag>".
      #
      # The output is written as a heredoc-style multiline value so
      # downstream steps can embed it in Markdown bodies and multi-line
      # changelog fields (CurseForge, Modrinth, the GitHub Release body).
      - name: Determine changelog
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            # Make sure the tag ref is available locally even if
            # fetch-depth didn't grab it for some reason.
            git fetch --tags --force origin "refs/tags/$TAG:refs/tags/$TAG" 2>/dev/null || true

            CHANGELOG=$(git tag -l --format='%(contents)' "$TAG" \
              | sed '/-----BEGIN PGP SIGNATURE-----/,/-----END PGP SIGNATURE-----/d')

            # Lightweight tag (no annotation) → use the commit body.
            if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
              CHANGELOG=$(git log -1 --format=%B "$TAG" 2>/dev/null || true)
            fi

            if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
              CHANGELOG="Release $TAG"
            fi
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Identify JARs
        id: jars
        run: |
          JAR_26_1=$(ls jars/26.1/neoorigins-*.jar | head -1)
          JAR_1_21_1=$(ls jars/1.21.1/neoorigins-*.jar | head -1)
          echo "jar_26_1=$JAR_26_1" >> $GITHUB_OUTPUT
          echo "jar_1_21_1=$JAR_1_21_1" >> $GITHUB_OUTPUT
          echo "name_26_1=$(basename $JAR_26_1)" >> $GITHUB_OUTPUT
          echo "name_1_21_1=$(basename $JAR_1_21_1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NeoOrigins ${{ steps.version.outputs.tag }}
          body: |
            ## NeoOrigins ${{ steps.version.outputs.tag }}

            Built for **Minecraft 26.1 / 26.1.1 / 26.1.2** and **1.21.1** with **NeoForge**.

            ${{ steps.notes.outputs.changelog }}

            ### Installation
            Download the JAR matching your Minecraft version and drop it into your `mods/` folder.
            - `${{ steps.jars.outputs.name_26_1 }}` — for MC 26.1, 26.1.1, and 26.1.2
            - `${{ steps.jars.outputs.name_1_21_1 }}` — for MC 1.21.1

            ### Origins Compatibility
            Drop Origins mod content packs (`.jar`, `.zip`, or folder) into the `originpacks/` folder in your game directory.
          files: |
            ${{ steps.jars.outputs.jar_26_1 }}
            ${{ steps.jars.outputs.jar_1_21_1 }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      # ----------------------------------------------------------------
      # Platform publishing — CurseForge + Modrinth
      # ----------------------------------------------------------------
      # Migrated from itsmeow/curseforge-upload + cloudnode-pro/modrinth-publish
      # to Kir-Antipov/mc-publish, which resolves CurseForge game-version
      # slugs via its own lookup table rather than the brittle string
      # match the old action used. The old action was silently uploading
      # jars without any game-version metadata on CurseForge, forcing a
      # manual fixup in the web UI after every release.
      #
      # Each jar is published as one mc-publish invocation that hits
      # both platforms in a single step.

      - name: Publish MC 26.1.x jar (CurseForge + Modrinth)
        if: vars.CURSEFORGE_PROJECT_ID != '' || vars.MODRINTH_PROJECT_ID != ''
        continue-on-error: true
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jars.outputs.jar_26_1 }}
          name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 26.1.x)
          version: ${{ steps.version.outputs.tag }}+26.1
          version-type: release
          changelog: ${{ steps.notes.outputs.changelog }}
          loaders: neoforge
          game-versions: |
            26.1
            26.1.1
            26.1.2
          java: |
            25
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn

      - name: Publish MC 1.21.1 jar (CurseForge + Modrinth)
        if: vars.CURSEFORGE_PROJECT_ID != '' || vars.MODRINTH_PROJECT_ID != ''
        continue-on-error: true
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jars.outputs.jar_1_21_1 }}
          name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 1.21.1)
          version: ${{ steps.version.outputs.tag }}+1.21.1
          version-type: release
          changelog: ${{ steps.notes.outputs.changelog }}
          loaders: neoforge
          game-versions: |
            1.21.1
          java: |
            21
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn
