name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.1.0)'
        required: true
      changelog:
        description: 'Release changelog (markdown)'
        required: true
        default: 'No changelog provided.'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Determine changelog
        id: notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            CHANGELOG="Release ${{ steps.version.outputs.tag }}"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Find JARs
        id: jars
        run: |
          JAR_26_1=$(find versions/26.1/build/libs -name 'neoorigins-*.jar' 2>/dev/null | grep -v sources | grep -v javadoc | head -1)
          JAR_26_1_1=$(find versions/26.1.1/build/libs -name 'neoorigins-*.jar' 2>/dev/null | grep -v sources | grep -v javadoc | head -1)
          echo "jar_26_1=$JAR_26_1" >> $GITHUB_OUTPUT
          echo "jar_26_1_1=$JAR_26_1_1" >> $GITHUB_OUTPUT
          echo "name_26_1=$(basename $JAR_26_1)" >> $GITHUB_OUTPUT
          echo "name_26_1_1=$(basename $JAR_26_1_1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NeoOrigins ${{ steps.version.outputs.tag }}
          body: |
            ## NeoOrigins ${{ steps.version.outputs.tag }}

            Built for **Minecraft 26.1** and **26.1.1** with **NeoForge**.

            ${{ steps.notes.outputs.changelog }}

            ### Installation
            Download the JAR matching your Minecraft version and drop it into your `mods/` folder.
            - `${{ steps.jars.outputs.name_26_1 }}` — for MC 26.1
            - `${{ steps.jars.outputs.name_26_1_1 }}` — for MC 26.1.1

            ### Origins Compatibility
            Drop Origins mod content packs (`.jar`, `.zip`, or folder) into the `originpacks/` folder in your game directory.
          files: |
            ${{ steps.jars.outputs.jar_26_1 }}
            ${{ steps.jars.outputs.jar_26_1_1 }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      - name: Upload to CurseForge (MC 26.1)
        if: vars.CURSEFORGE_PROJECT_ID != ''
        continue-on-error: true
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: ${{ steps.jars.outputs.jar_26_1 }}
          game_endpoint: minecraft
          game_versions: "Minecraft 26.1,NeoForge,Java 25"
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          release_type: release
          display_name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 26.1)
          changelog: ${{ steps.notes.outputs.changelog }}

      - name: Upload to CurseForge (MC 26.1.1)
        if: vars.CURSEFORGE_PROJECT_ID != ''
        continue-on-error: true
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: ${{ steps.jars.outputs.jar_26_1_1 }}
          game_endpoint: minecraft
          game_versions: "Minecraft 26.1.1,NeoForge,Java 25"
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          release_type: release
          display_name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 26.1.1)
          changelog: ${{ steps.notes.outputs.changelog }}

      - name: Upload to Modrinth (MC 26.1)
        if: vars.MODRINTH_PROJECT_ID != ''
        continue-on-error: true
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT_ID }}
          files: ${{ steps.jars.outputs.jar_26_1 }}
          name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 26.1)
          version: ${{ steps.version.outputs.tag }}+26.1
          changelog: ${{ steps.notes.outputs.changelog }}
          loaders: neoforge
          game-versions: "26.1"
          channel: release

      - name: Upload to Modrinth (MC 26.1.1)
        if: vars.MODRINTH_PROJECT_ID != ''
        continue-on-error: true
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT_ID }}
          files: ${{ steps.jars.outputs.jar_26_1_1 }}
          name: NeoOrigins ${{ steps.version.outputs.tag }} (MC 26.1.1)
          version: ${{ steps.version.outputs.tag }}+26.1.1
          changelog: ${{ steps.notes.outputs.changelog }}
          loaders: neoforge
          game-versions: "26.1.1"
          channel: release
